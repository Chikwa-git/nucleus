<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nucleus - Resumidor de Documentos com IA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 1em;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px dashed #667eea;
            border-radius: 10px;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
        }

        input[type="file"]:hover {
            border-color: #764ba2;
            background: #f0f1ff;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .result-container {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9ff;
            border-radius: 10px;
            border: 0.5px solid #e0e0e0;
            display: none;
        }

        .result-container.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }

        .result-title {
            color: #667eea;
            font-size: 1.3em;
            font-weight: 600;
        }

        .result-meta {
            font-size: 0.9em;
            color: #666;
        }

        .btn-copy {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            flex: none;
            width: auto;
        }

        .btn-copy:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }

        .btn-copy:active {
            transform: translateY(0);
        }

        .btn-copy.copied {
            background: #10b981;
        }

        .result-content {
            color: #333;
            line-height: 1.8;
            font-size: 1em;
            white-space: pre-wrap;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid #c33;
            margin-top: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-box {
            background: #e8f4f8;
            border-left: 5px solid #17a2b8;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 0.95em;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Nucleus</h1>
        <p class="subtitle">Resumidor de Documentos com IA</p>

        <div class="info-box">
            📄 Envie um documento PDF ou TXT e escolha como deseja resumir o conteúdo usando IA.
        </div>

        <form id="uploadForm" enctype="multipart/form-data">
            <div class="form-group">
                <label for="document">📎 Selecione o Documento (PDF ou TXT)</label>
                <input type="file" id="document" name="document" accept=".pdf,.txt" required>
            </div>

            <div class="form-group">
                <label for="summary_type">📝 Tipo de Resumo</label>
                <select id="summary_type" name="summary_type" required>
                    <option value="short">Resumo Curto (3 parágrafos)</option>
                    <option value="detailed">Resumo Detalhado</option>
                    <option value="bullets">Bullet Points</option>
                </select>
            </div>

            <div class="form-group">
                <label for="ai_provider">🤖 Escolha a IA</label>
                <select id="ai_provider" name="ai_provider" required>
                    <option value="gemini">Google Gemini</option>
                    <option value="groq">Groq (Llama 3.3)</option>
                    <option value="openai" disabled>OpenAI (ChatGPT) — requer chave própria</option>
                </select>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit">✨ Gerar Resumo</button>
                <button type="button" class="btn-clear" onclick="clearResults()">🗑️ Limpar</button>
            </div>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processando documento e gerando resumo...</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="result-container" id="resultContainer">
            <div class="result-header">
                <div>
                    <div class="result-title">📋 Resumo Gerado</div>
                    <div class="result-meta" id="resultMeta"></div>
                </div>
                <button class="btn-copy" id="btnCopy" onclick="copySummary()" style="width: fit-content; align-self: center;">
                    <span id="copyIcon">📋</span>
                    <span id="copyText">Copiar</span>
                </button>
            </div>
            <div class="result-content" id="resultContent"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');
        const resultContainer = document.getElementById('resultContainer');
        const resultContent = document.getElementById('resultContent');
        const resultMeta = document.getElementById('resultMeta');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Hide previous results
            resultContainer.classList.remove('show');
            errorMessage.classList.remove('show');
            loading.classList.add('show');

            // Disable submit button
            const submitBtn = form.querySelector('.btn-submit');
            submitBtn.disabled = true;

            const formData = new FormData(form);

            try {
                const response = await fetch('/summarize', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Show success result
                    resultContent.innerHTML = marked.parse(data.summary);
                    
                    const aiNames = {
                        'groq': 'Groq (Llama 3.3)',
                        'gemini': 'Google Gemini',
                        'openai': 'OpenAI (ChatGPT)'
                    };
                    const aiName = aiNames[data.ai_provider] || data.ai_provider;
                    const summaryTypeName = {
                        'short': 'Resumo Curto',
                        'detailed': 'Resumo Detalhado',
                        'bullets': 'Bullet Points'
                    }[data.summary_type];
                    
                    resultMeta.textContent = `${aiName} • ${summaryTypeName}`;
                    resultContainer.classList.add('show');
                } else {
                    // Show error
                    errorMessage.textContent = '❌ ' + (data.error || 'Erro ao processar documento');
                    errorMessage.classList.add('show');
                }
            } catch (error) {
                errorMessage.textContent = '❌ Erro de conexão: ' + error.message;
                errorMessage.classList.add('show');
            } finally {
                loading.classList.remove('show');
                submitBtn.disabled = false;
            }
        });

        function clearResults() {
            form.reset();
            resultContainer.classList.remove('show');
            errorMessage.classList.remove('show');
        }

        async function copySummary() {
            const resultContent = document.getElementById('resultContent');
            const btnCopy = document.getElementById('btnCopy');
            const copyIcon = document.getElementById('copyIcon');
            const copyText = document.getElementById('copyText');
            
            try {
                // Get the text content (strip HTML tags for plain text copy)
                const textToCopy = resultContent.innerText;
                
                // Copy to clipboard
                await navigator.clipboard.writeText(textToCopy);
                
                // Update button to show success
                btnCopy.classList.add('copied');
                copyIcon.textContent = '✓';
                copyText.textContent = 'Copiado!';
                
                // Reset button after 2 seconds
                setTimeout(() => {
                    btnCopy.classList.remove('copied');
                    copyIcon.textContent = '📋';
                    copyText.textContent = 'Copiar';
                }, 2000);
            } catch (err) {
                console.error('Erro ao copiar:', err);
                copyText.textContent = 'Erro';
                setTimeout(() => {
                    copyText.textContent = 'Copiar';
                }, 2000);
            }
        }
    </script>
</body>
</html>
